<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>横向两张自动轮播</title>
<style>
body { margin: 0; padding: 0; }
.carousel-container {
  width: 320px;           /* 可根据需要修改 */
  overflow: hidden;        /* 隐藏多余图片 */
  margin: 0 auto;
  border: none;            /* 去掉边线 */
}

.carousel-track {
  display: flex;
  transition: transform 0.5s ease-in-out;
}

.carousel-slide {
  min-width: 160px;        /* 每张图片占容器一半宽度，两张并排 */
  margin-right: 0;          /* 图片间距，可调 */
}

img {
  width: 100%;
  display: block;
}
</style>
</head>
<body>

<div class="carousel-container">
  <div class="carousel-track" id="carouselTrack">
    <div class="carousel-slide"><img src="images/image1.svg" alt=""></div>
    <div class="carousel-slide"><img src="images/image2.svg" alt=""></div>
    <div class="carousel-slide"><img src="images/image3.svg" alt=""></div>
    <div class="carousel-slide"><img src="images/image4.svg" alt=""></div>
    <div class="carousel-slide"><img src="images/image5.svg" alt=""></div>
    <div class="carousel-slide"><img src="images/image6.svg" alt=""></div>
  </div>
</div>

<script>
const track = document.getElementById('carouselTrack');
const slides = track.children;
const slideCount = slides.length;
const slideWidth = slides[0].offsetWidth;
let index = 0;

// 自动轮播函数
function moveCarousel() {
  index++;
  if (index > slideCount - 2) {  // 显示两张图片
    index = 0;
  }
  track.style.transform = `translateX(-${index * slideWidth}px)`;
}

// 每3秒轮播一次
setInterval(moveCarousel, 3000);
</script>

</body>
</html>
