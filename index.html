<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>横向两张自动轮播</title>
<style>
body {
  margin: 0;
  padding: 0;
}
.carousel-container {
  width: 320px;          /* 容器宽度 = 两张图片总宽度 */
  overflow: hidden;
  margin: 0 auto;
}

.carousel-track {
  display: flex;
  width: max-content;
  animation: scroll 8s linear infinite;  /* 修改速度为8秒 */
}

.carousel-slide {
  min-width: 160px;       /* 每张图片宽度 */
  flex-shrink: 0;
  margin-right: 0;
}

img {
  width: 100%;
  display: block;
  border-radius: 12px; /* 圆角效果，可调整 */
}
@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); } /* 移动一半长度，实现平滑循环 */
}
</style>
</head>
<body>

<div class="carousel-container">
  <div class="carousel-track" id="carouselTrack">
    <!-- 图片列表 -->
    <div class="carousel-slide"><img src="images/图片10.png" alt=""></div>
    <div class="carousel-slide"><img src="images/图片11.png" alt=""></div>
